    <script>
        // 检查是否在微信环境中
        function isWeixinBrowser() {
            const ua = navigator.userAgent.toLowerCase();
            return ua.indexOf('micromessenger') !== -1;
        }

        // 动态加载微信 JS-SDK
        function loadWxScript() {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://res.wx.qq.com/open/js/jweixin-1.6.0.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // 微信 JSSDK 配置
        async function initWxConfig() {
            // 如果不是微信环境，直接返回
            if (!isWeixinBrowser()) {
                return;
            }

            try {
                await loadWxScript();
                const url = window.location.href.split('#')[0];

                // 从服务器获取签名配置；静态部署无后端时静默跳过
                const response = await fetch('/wxapi/wx_config.php?url=' + encodeURIComponent(url));
                if (!response.ok) {
                    console.warn('微信签名接口不可用，跳过 JSSDK 配置:', response.status);
                    return;
                }
                const config = await response.json();

                wx.config({
                    debug: false,
                    appId: config.appId,
                    timestamp: config.timestamp,
                    nonceStr: config.nonceStr,
                    signature: config.signature,
                    jsApiList: [
                        'onMenuShareAppMessage',
                        'onMenuShareTimeline',
                        'updateAppMessageShareData',
                        'updateTimelineShareData'
                    ]
                });

                wx.ready(function () {
                    updateWxShareInfo();
                });

                wx.error(function (res) {
                    console.warn('微信 JSSDK 配置失败:', res);
                });
            } catch (error) {
                console.warn('初始化微信配置失败（已忽略）:', error);
            }
        }

        // 更新微信分享信息
        function updateWxShareInfo() {
            if (!isWeixinBrowser() || typeof wx === 'undefined' || !wx.ready) {
                return;
            }

            const url = window.location.href.split('#')[0];
            // 分享给朋友
            wx.updateAppMessageShareData({
                title: `正念木鱼 - 线上修行，获取内心平静`,
                desc: '日日正念，福慧双修。持之以恒，方得始终。',
                link: url,
                imgUrl: window.location.origin + '/icon.png',
                success: function () {
                    console.log('分享设置成功');
                },
                fail: function (res) {
                    console.error('分享设置失败:', res);
                }
            });

            // 分享到朋友圈
            wx.updateTimelineShareData({
                title: `正念木鱼 - 线上修行，获取内心平静`,
                desc: '日日正念，福慧双修。持之以恒，方得始终。',
                link: url,
                imgUrl: window.location.origin + '/icon.png',
                success: function () {
                    console.log('朋友圈分享设置成功');
                },
                fail: function (res) {
                    console.error('朋友圈分享设置失败:', res);
                }
            });
        }

        // 页面加载完成后初始化微信配置
        window.addEventListener('load', async () => {
            await initWxConfig();
        });
    </script>

    <script>
        // 梵音环绕开关处理
        // 梵音环绕开关：仅控制 UI 显示/隐藏 + 拦截 play()。
        // 选曲、音量、状态由 script.js 统一管理，避免重复绑定。
        document.addEventListener('DOMContentLoaded', function () {
            const ambientSoundToggle = document.getElementById('ambientSoundToggle');
            const musicControls = document.getElementById('musicControls');
            const backgroundMusic = document.getElementById('background-music');

            function updateMusicControlsVisibility() {
                if (ambientSoundToggle.checked) {
                    musicControls.style.display = 'block';
                } else {
                    musicControls.style.display = 'none';
                    backgroundMusic.pause();
                    backgroundMusic.currentTime = 0;
                    backgroundMusic.src = '';
                }
            }

            updateMusicControlsVisibility();
            ambientSoundToggle.addEventListener('change', updateMusicControlsVisibility);

            // 拦截 play()：梵音环绕关闭时静默 resolve，避免抛错；AbortError 同样吞掉
            const originalPlay = backgroundMusic.play.bind(backgroundMusic);
            backgroundMusic.play = function () {
                if (!ambientSoundToggle.checked) {
                    return Promise.resolve();
                }
                return originalPlay.apply(this, arguments).catch(err => {
                    if (err && err.name === 'AbortError') {
                        return Promise.resolve();
                    }
                    return Promise.reject(err);
                });
            };

            window.isMusicAllowed = function () {
                return ambientSoundToggle.checked;
            };
        });
    </script>

    <script>
        // 更新应用：只清自己的缓存（前缀 woodenfish-），不影响同域其他 PWA
        function updateApp() {
            caches.keys().then(keys => {
                return Promise.all(
                    keys.filter(key => key.startsWith('woodenfish-'))
                        .map(key => caches.delete(key))
                );
            }).then(() => {
                window.location.reload();
            });
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 注册成功');
                        // 检查更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    document.getElementById('update-toast').style.display = 'block';
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('ServiceWorker 注册失败:', error);
                    });
            });
        }

        // 提供给 script.js 的统一查询点
        window.shouldPlayMusic = function () {
            return typeof window.isMusicAllowed === 'function' && window.isMusicAllowed();
        };

        // iOS Safari "添加到主屏" 引导
        (function () {
            const ua = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
            const isSafari = !/CriOS|FxiOS|EdgiOS|OPiOS|mercury/i.test(ua);
            const isStandalone = window.navigator.standalone === true ||
                window.matchMedia('(display-mode: standalone)').matches;
            let dismissed = false;
            try { dismissed = localStorage.getItem('a2hs-dismissed') === '1'; } catch (e) { /* noop */ }

            if (isIOS && isSafari && !isStandalone && !dismissed) {
                window.addEventListener('load', () => {
                    setTimeout(() => {
                        const tip = document.getElementById('a2hs-tip');
                        if (tip) tip.style.display = 'block';
                    }, 1500);
                });
                document.getElementById('a2hs-close').addEventListener('click', () => {
                    document.getElementById('a2hs-tip').style.display = 'none';
                    try { localStorage.setItem('a2hs-dismissed', '1'); } catch (e) { /* noop */ }
                });
            }
        })();
